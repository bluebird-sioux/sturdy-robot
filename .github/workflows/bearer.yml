# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
#
# This workflow file requires a free account on Bearer.com to manage findings, notifications and more.
# See https://docs.bearer.com/guides/bearer-cloud/
name: Bearer

on:
  push:
    branches: ["main", "ammm"]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: ["main"]
  schedule:
    - cron: '37 14 * * 6'

permissions:
  contents: read # for actions/checkout to fetch code
  security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
  actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status

jobs:
  bearer:
    runs-on: ubuntu-latest
    steps:
      # Checkout project source
      - uses: actions/checkout@v4
      # Scan code using Bearer CLI
      - name: Run Report
        id: report
        uses: bearer/bearer-action@828eeb928ce2f4a7ca5ed57fb8b59508cb8c79bc
        with:
          api-key: ${{ secrets.BEARER_TOKEN }}
          format: sarif
          output: results.sarif
          exit-code: 0
      # Upload SARIF file generated in previous step
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
            - name: Token Guard — LLM Token Limit Checker
  # You may pin to the exact commit or the version.
  # uses: cuttlesoft/token-guard@2d647b930262b830911319476ce46c99dcc07567
  uses: cuttlesoft/token-guard@v1
  with:
    # Glob patterns targeting LLM instruction/config files, one per line. Supports ! negation.
    patterns: # default is **/CLAUDE.md
.claude/**
**/AGENTS.md
.cursorrules
.cursor/rules/**
.windsurfrules
.clinerules
.github/copilot-instructions.md
.github/prompts/**
.github/agents/**
prompts/**
.prompts/**

    # Token limit threshold
    max_tokens: # optional, default is 2500
    # "total" (sum of all files) or "per_file" (each file individually)
    token_limit_mode: # optional, default is total
    # Tiktoken encoding: cl100k_base, o200k_base, p50k_base, p50k_edit, r50k_base
    encoding: # optional, default is cl100k_base
          
